# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  secret-preflight:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Check required Supabase secrets
        id: check
        shell: bash
        run: |
          missing=()

          [ -z "$SUPABASE_ACCESS_TOKEN" ] && missing+=("SUPABASE_ACCESS_TOKEN")
          [ -z "$SUPABASE_PROJECT_REF" ] && missing+=("SUPABASE_PROJECT_REF")
          [ -z "$SUPABASE_DB_PASSWORD" ] && missing+=("SUPABASE_DB_PASSWORD")

          if [ ${#missing[@]} -gt 0 ]; then
            missing_csv=$(IFS=, ; echo "${missing[*]}")
            {
              echo "missing_csv=$missing_csv"
              echo "missing_md<<'EOF'"
              for secret in "${missing[@]}"; do
                echo "- \`$secret\`"
              done
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            for secret in "${missing[@]}"; do
              echo "::error title=Missing required secret::$secret is not configured"
            done

            {
              echo "## ❌ Missing required Supabase secrets"
              for secret in "${missing[@]}"; do
                echo "- \`$secret\`"
              done
            } >> "$GITHUB_STEP_SUMMARY"

            exit 1
          fi

          echo "missing_csv=" >> "$GITHUB_OUTPUT"
          echo "missing_md=" >> "$GITHUB_OUTPUT"
          echo "## ✅ Required Supabase secrets are configured" >> "$GITHUB_STEP_SUMMARY"

      - name: Post PR comment when secrets are missing
        if: failure() && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v7
        env:
          MISSING_MD: ${{ steps.check.outputs.missing_md }}
        with:
          script: |
            const marker = '<!-- secret-preflight -->'
            const body = `${marker}
            ⚠️ CI secret preflight failed.

            Missing required Supabase secrets:
            ${process.env.MISSING_MD}`

            const { owner, repo } = context.repo
            const issue_number = context.issue.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              })
            }

  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm verify

      - run: pnpm vitest run

  integration:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:integration

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Deploy report to GitHub Pages
        if: failure()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./playwright-report

      - name: Link to report
        if: failure()
        run: echo "### [View Playwright Report](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)" >> $GITHUB_STEP_SUMMARY

  e2e-supabase:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --ipc=host
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test:e2e
        env:
          VITE_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          VITE_GIT_HASH: ${{ github.sha }}
          VITE_GIT_DATE: ${{ github.event.head_commit.timestamp }}
          VITE_PR_NUMBER: ${{ github.event.number }}
          VITE_BRANCH: ${{ github.ref_name }}

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-supabase
          path: playwright-report/
          retention-days: 7

  migrate-prod:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: supabase/setup-cli@v1

      - run: pnpx supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}

      - run: pnpm db:push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: migrate-prod
    permissions:
      contents: read
      packages: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Resolve PR number for commit
        run: |
          PR_NUMBER=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            | jq -r '.[0].number // ""')
          echo "VITE_PR_NUMBER=$PR_NUMBER" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
            VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY=${{ secrets.SUPABASE_ANON_KEY }}
            VITE_GIT_HASH=${{ github.sha }}
            VITE_GIT_DATE=${{ github.event.head_commit.timestamp }}
            VITE_PR_NUMBER=${{ env.VITE_PR_NUMBER }}
            VITE_BRANCH=${{ github.ref_name }}

      - name: Trigger Coolify deploy
        run: |
          curl "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
          -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
